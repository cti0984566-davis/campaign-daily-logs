<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Daily Log</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 2rem;
      max-width: 1000px;
      line-height: 1.6;
    }

    h1 {
      margin-bottom: 0.5rem;
    }

    .meta {
      color: #555;
      margin-bottom: 1rem;
    }

    .log-list a {
      display: block;
      margin-bottom: 0.3rem;
      color: #0366d6;
      text-decoration: none;
      cursor: pointer;
    }

    .log-list a:hover {
      text-decoration: underline;
    }

    pre {
      background: #f6f8fa;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .viewer {
      margin-top: 2rem;
    }
  </style>
</head>

<body>
  <h1>Cyber Daily Log</h1>
  <p class="meta">ログ一覧（クリックで詳細表示）</p>

  <!-- 一覧 -->
  <div id="list" class="log-list">
    Loading...
  </div>

  <hr>

  <!-- 詳細表示 -->
  <div class="viewer">
    <h2>詳細</h2>
    <pre id="viewer">ログを選択してください</pre>
  </div>

  <script>
    const BASE_PATH = "/campaign-daily-logs/logs/";

    // 一覧を取得
    fetch(BASE_PATH + "index.json")
      .then(res => {
        if (!res.ok) {
          throw new Error("HTTP error " + res.status);
        }
        return res.json();
      })
      .then(list => {
        const container = document.getElementById("list");
        container.innerHTML = "";

        // 新しい順に並べたい場合
        list.reverse();

        list.forEach(path => {
          const link = document.createElement("a");

          // 表示用（ファイル名だけにする）
          link.textContent = path;

          link.onclick = () => {
            fetch(BASE_PATH + path)
              .then(res => {
                if (!res.ok) {
                  throw new Error("HTTP error " + res.status);
                }
                return res.json();
              })
              .then(data => {
                document.getElementById("viewer").textContent =
                  JSON.stringify(data, null, 2);
              })
              .catch(err => {
                document.getElementById("viewer").textContent =
                  "Error: " + err;
              });
          };

          container.appendChild(link);
        });
      })
      .catch(err => {
        document.getElementById("list").textContent =
          "Error: " + err;
      });
  </script>
</body>
</html>
