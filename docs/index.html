<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTI / OSINT Portal</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #131a2a;
      --panel-2: #1a2338;
      --border: #2a3550;
      --text: #e8edf7;
      --muted: #9fb0cc;
      --accent: #6ea8fe;
      --accent-2: #8bd3ff;
      --good: #37c871;
      --warn: #f4c430;
      --danger: #ff6b6b;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans",
        "Yu Gothic UI", "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #0d1427 100%);
      color: var(--text);
    }

    header {
      padding: 24px 20px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(11, 16, 32, 0.92);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(8px);
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
    }

    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .toolbar {
      margin-top: 14px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar input {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      min-width: 280px;
      outline: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      padding: 20px;
      min-height: calc(100vh - 110px);
    }

    .sidebar,
    .content {
      min-width: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .panel-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .panel-header h2,
    .panel-header h3 {
      margin: 0;
      font-size: 1rem;
    }

    .panel-header .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .campaign-list {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .campaign-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .campaign-card:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .campaign-card.active {
      border-color: var(--accent-2);
      background: rgba(110, 168, 254, 0.09);
    }

    .campaign-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }

    .campaign-name {
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
      word-break: break-word;
    }

    .campaign-count {
      flex-shrink: 0;
      font-size: 0.82rem;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .campaign-meta {
      margin-top: 10px;
      display: grid;
      gap: 4px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .empty {
      padding: 16px;
      color: var(--muted);
    }

    .content .hero {
      padding: 18px;
      border-bottom: 1px solid var(--border);
    }

    .hero-title {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .hero-chip {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .timeline {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .timeline-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel-2);
      overflow: hidden;
    }

    .timeline-main {
      padding: 14px 16px;
    }

    .timeline-date {
      color: var(--accent-2);
      font-size: 0.88rem;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .timeline-title {
      margin: 0 0 8px;
      font-size: 1rem;
      line-height: 1.5;
    }

    .timeline-summary {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .timeline-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .badge {
      font-size: 0.78rem;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    details.raw-json {
      border-top: 1px solid var(--border);
      background: rgba(0, 0, 0, 0.14);
    }

    details.raw-json summary {
      cursor: pointer;
      list-style: none;
      padding: 12px 16px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    details.raw-json summary::-webkit-details-marker {
      display: none;
    }

    details.raw-json summary:hover {
      color: var(--text);
    }

    .json-block {
      margin: 0;
      padding: 0 16px 16px;
      overflow: auto;
      font-size: 0.83rem;
      line-height: 1.55;
      color: #d7e6ff;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .loading,
    .error {
      padding: 18px;
      color: var(--muted);
    }

    .error {
      color: #ffb4b4;
    }

    .daily-panel {
      margin-top: 16px;
    }

    .daily-list {
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .daily-item {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 0.9rem;
      text-decoration: none;
      display: block;
    }

    .daily-item:hover {
      border-color: var(--accent);
    }

    .daily-path {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 4px;
      word-break: break-all;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>CTI / OSINT Portal</h1>
    <p>Campaign を actor 単位で整理し、時系列で閲覧できる最小ビュー</p>
    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="actor名で検索（例: APT29, TA416）" />
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel">
        <div class="panel-header">
          <h2>Campaigns</h2>
          <div class="sub">actorカード表示 / 件数 / 最新更新日</div>
        </div>
        <div id="campaignList" class="campaign-list">
          <div class="loading">Campaign一覧を読み込み中...</div>
        </div>
      </section>

      <section class="panel daily-panel">
        <div class="panel-header">
          <h3>Daily Logs</h3>
          <div class="sub">従来の日次ログ一覧も維持</div>
        </div>
        <div id="dailyList" class="daily-list">
          <div class="loading">Daily一覧を読み込み中...</div>
        </div>
      </section>
    </aside>

    <section class="content panel">
      <div id="contentArea">
        <div class="hero">
          <h2 class="hero-title">Campaignを選択してください</h2>
          <div class="hero-meta">
            <span class="hero-chip">actorカード → 時系列ビュー</span>
            <span class="hero-chip">JSON生表示は折りたたみ</span>
          </div>
        </div>
        <div class="empty">
          左側の Campaigns から actor を選ぶと、その actor 配下の JSON を日付順に並べて表示します。
        </div>
      </div>
    </section>
  </main>

  <script>
    const CAMPAIGN_INDEX_URL = "./campaigns/index.json";
    const DAILY_INDEX_URL = "./logs/index.json";

    const state = {
      campaignGroups: [],
      selectedActor: null,
      search: ""
    };

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`Failed to fetch: ${url} (${res.status})`);
      }
      return res.json();
    }

    function normalizeToPaths(data) {
      const paths = [];

      function walk(value) {
        if (value == null) return;

        if (typeof value === "string") {
          if (value.endsWith(".json")) {
            paths.push(value);
          }
          return;
        }

        if (Array.isArray(value)) {
          value.forEach(walk);
          return;
        }

        if (typeof value === "object") {
          const candidateKeys = ["path", "file", "filepath", "name", "url"];
          for (const key of candidateKeys) {
            if (typeof value[key] === "string" && value[key].endsWith(".json")) {
              paths.push(value[key]);
            }
          }
          Object.values(value).forEach(walk);
        }
      }

      walk(data);

      return [...new Set(paths)];
    }

    function normalizePath(path) {
      if (!path) return path;

      let p = path.trim();

      p = p.replace(/^\.?\//, "");
      p = p.replace(/^docs\//, "");

      return p;
    }

    function extractDateFromPath(path) {
      const m = path.match(/(\d{4}-\d{2}-\d{2})\.json$/);
      return m ? m[1] : null;
    }

    function extractActorFromCampaignPath(path) {
      const normalized = normalizePath(path);
      const m = normalized.match(/^campaigns\/([^/]+)\//);
      return m ? m[1] : null;
    }

    function groupCampaignPaths(paths) {
      const groups = new Map();

      for (const rawPath of paths) {
        const path = normalizePath(rawPath);
        const actor = extractActorFromCampaignPath(path);
        if (!actor) continue;

        const date = extractDateFromPath(path);

        if (!groups.has(actor)) {
          groups.set(actor, {
            actor,
            files: [],
            count: 0,
            latestDate: null
          });
        }

        const group = groups.get(actor);
        group.files.push({ path, date });
        group.count += 1;

        if (!group.latestDate || (date && date > group.latestDate)) {
          group.latestDate = date;
        }
      }

      const result = Array.from(groups.values())
        .map(group => {
          group.files.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
          return group;
        })
        .sort((a, b) => {
          const dateCompare = (b.latestDate || "").localeCompare(a.latestDate || "");
          if (dateCompare !== 0) return dateCompare;
          return a.actor.localeCompare(b.actor);
        });

      return result;
    }

    function summarizeRecord(record, fallbackPath) {
      if (!record || typeof record !== "object") {
        return {
          title: fallbackPath,
          summary: "JSONの読み込み結果を要約できませんでした。",
          badges: []
        };
      }

      const title =
        record.title ||
        record.name ||
        record.campaign_summary ||
        record.summary?.slice?.(0, 120) ||
        fallbackPath;

      let summary = "";

      if (typeof record.campaign_summary === "string" && record.campaign_summary.trim()) {
        summary = record.campaign_summary.trim();
      } else if (typeof record.summary === "string" && record.summary.trim()) {
        summary = record.summary.trim();
      } else if (typeof record.assessment_delta === "string" && record.assessment_delta.trim()) {
        summary = record.assessment_delta.trim();
      } else if (Array.isArray(record.change_summary) && record.change_summary.length > 0) {
        summary = record.change_summary.join(" / ");
      } else if (Array.isArray(record.items) && record.items.length > 0) {
        const first = record.items[0];
        summary =
          first.summary ||
          first.name ||
          first.title ||
          "items配下に記録あり";
      } else {
        summary = "要約フィールド未設定";
      }

      const badges = [];

      if (record.update_type) badges.push(String(record.update_type));
      if (record.status) badges.push(String(record.status));
      if (Array.isArray(record.tags)) {
        record.tags.slice(0, 4).forEach(tag => badges.push(String(tag)));
      }

      return { title, summary, badges };
    }

    function renderCampaignList() {
      const root = document.getElementById("campaignList");
      const q = state.search.trim().toLowerCase();

      const filtered = state.campaignGroups.filter(group => {
        if (!q) return true;
        return group.actor.toLowerCase().includes(q);
      });

      if (filtered.length === 0) {
        root.innerHTML = `<div class="empty">該当するCampaignがありません。</div>`;
        return;
      }

      root.innerHTML = filtered.map(group => `
        <article
          class="campaign-card ${state.selectedActor === group.actor ? "active" : ""}"
          data-actor="${escapeHtml(group.actor)}"
        >
          <div class="campaign-top">
            <h3 class="campaign-name">${escapeHtml(group.actor)}</h3>
            <div class="campaign-count">${group.count}件</div>
          </div>
          <div class="campaign-meta">
            <div>最新更新日: ${escapeHtml(group.latestDate || "-")}</div>
            <div>記録件数: ${group.count}</div>
          </div>
        </article>
      `).join("");

      root.querySelectorAll(".campaign-card").forEach(el => {
        el.addEventListener("click", () => {
          const actor = el.dataset.actor;
          state.selectedActor = actor;
          renderCampaignList();
          renderSelectedActor();
        });
      });
    }

    async function renderSelectedActor() {
      const content = document.getElementById("contentArea");
      const actor = state.selectedActor;
      const group = state.campaignGroups.find(g => g.actor === actor);

      if (!group) {
        content.innerHTML = `
          <div class="hero">
            <h2 class="hero-title">Campaignを選択してください</h2>
            <div class="hero-meta">
              <span class="hero-chip">actorカード → 時系列ビュー</span>
            </div>
          </div>
          <div class="empty">左側から actor を選択してください。</div>
        `;
        return;
      }

      content.innerHTML = `
        <div class="hero">
          <h2 class="hero-title">${escapeHtml(group.actor)}</h2>
          <div class="hero-meta">
            <span class="hero-chip">記録件数: ${group.count}</span>
            <span class="hero-chip">最新更新日: ${escapeHtml(group.latestDate || "-")}</span>
            <span class="hero-chip">JSON生表示: 折りたたみ</span>
          </div>
        </div>
        <div class="loading">時系列データを読み込み中...</div>
      `;

      try {
        const records = await Promise.all(
          group.files.map(async file => {
            try {
              const data = await fetchJson(`./${file.path}`);
              return { file, data, ok: true };
            } catch (err) {
              return { file, data: { _error: String(err.message || err) }, ok: false };
            }
          })
        );

        const timelineHtml = records.map(({ file, data, ok }) => {
          const date = file.date || "-";
          const meta = summarizeRecord(data, file.path);
          const jsonText = JSON.stringify(data, null, 2);

          return `
            <article class="timeline-item">
              <div class="timeline-main">
                <div class="timeline-date">${escapeHtml(date)}</div>
                <h3 class="timeline-title">${escapeHtml(meta.title)}</h3>
                <p class="timeline-summary">${
                  ok
                    ? escapeHtml(meta.summary)
                    : `読み込み失敗: ${escapeHtml(data._error || "unknown error")}`
                }</p>
                <div class="timeline-meta">
                  ${meta.badges.map(b => `<span class="badge">${escapeHtml(b)}</span>`).join("")}
                  <span class="badge">${escapeHtml(file.path)}</span>
                </div>
              </div>
              <details class="raw-json">
                <summary>JSONを表示</summary>
                <pre class="json-block">${escapeHtml(jsonText)}</pre>
              </details>
            </article>
          `;
        }).join("");

        content.innerHTML = `
          <div class="hero">
            <h2 class="hero-title">${escapeHtml(group.actor)}</h2>
            <div class="hero-meta">
              <span class="hero-chip">記録件数: ${group.count}</span>
              <span class="hero-chip">最新更新日: ${escapeHtml(group.latestDate || "-")}</span>
              <span class="hero-chip">表示順: 新しい順</span>
            </div>
          </div>
          <div class="timeline">
            ${timelineHtml || `<div class="empty">表示できる記録がありません。</div>`}
          </div>
        `;
      } catch (err) {
        content.innerHTML = `
          <div class="hero">
            <h2 class="hero-title">${escapeHtml(group.actor)}</h2>
            <div class="hero-meta">
              <span class="hero-chip">記録件数: ${group.count}</span>
              <span class="hero-chip">最新更新日: ${escapeHtml(group.latestDate || "-")}</span>
            </div>
          </div>
          <div class="error">時系列ビューの生成に失敗しました: ${escapeHtml(err.message || err)}</div>
        `;
      }
    }

    function renderDailyList(paths) {
      const root = document.getElementById("dailyList");
      const normalized = paths
        .map(normalizePath)
        .filter(p => p.startsWith("logs/"))
        .sort((a, b) => b.localeCompare(a));

      if (normalized.length === 0) {
        root.innerHTML = `<div class="empty">Daily Logs が見つかりません。</div>`;
        return;
      }

      root.innerHTML = normalized.slice(0, 20).map(path => {
        const date = extractDateFromPath(path) || path;
        return `
          <a class="daily-item" href="./${escapeHtml(path)}" target="_blank" rel="noopener noreferrer">
            ${escapeHtml(date)}
            <span class="daily-path">${escapeHtml(path)}</span>
          </a>
        `;
      }).join("");
    }

    async function init() {
      try {
        const [campaignIndex, dailyIndex] = await Promise.all([
          fetchJson(CAMPAIGN_INDEX_URL),
          fetchJson(DAILY_INDEX_URL).catch(() => [])
        ]);

        const campaignPaths = normalizeToPaths(campaignIndex)
          .map(normalizePath)
          .filter(p => p.startsWith("campaigns/"));

        state.campaignGroups = groupCampaignPaths(campaignPaths);

        renderCampaignList();

        const dailyPaths = normalizeToPaths(dailyIndex);
        renderDailyList(dailyPaths);

        if (state.campaignGroups.length > 0) {
          state.selectedActor = state.campaignGroups[0].actor;
          renderCampaignList();
          renderSelectedActor();
        }
      } catch (err) {
        document.getElementById("campaignList").innerHTML = `
          <div class="error">Campaign一覧の読み込みに失敗しました: ${escapeHtml(err.message || err)}</div>
        `;
        document.getElementById("dailyList").innerHTML = `
          <div class="error">Daily一覧の読み込みに失敗しました。</div>
        `;
      }
    }

    document.getElementById("searchInput").addEventListener("input", (e) => {
      state.search = e.target.value;
      renderCampaignList();
    });

    init();
  </script>
</body>
</html>
