<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Cyber Daily Log</title>
</head>
<body>
  <h1>Cyber Daily Log</h1>
  <p>最新ログ：</p>

  <pre id="output"></pre>

  <script>
    fetch("../logs/2026/04/2026-04-09.json")

        document.getElementById("output").textContent =

      });

</body>
</html>
