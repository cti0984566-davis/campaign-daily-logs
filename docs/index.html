<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CTI / OSINT Portal</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #131a2a;
      --panel-2: #1a2338;
      --panel-3: #101728;
      --border: #2a3550;
      --text: #e8edf7;
      --muted: #9fb0cc;
      --accent: #6ea8fe;
      --accent-2: #8bd3ff;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
      --high: #ff6b6b;
      --medium: #f4c430;
      --low: #57cc99;
      --monitor: #8d99ae;
      --new: #57cc99;
      --ongoing: #8bd3ff;
      --assessment: #f4c430;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans",
        "Yu Gothic UI", "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #0d1427 100%);
      color: var(--text);
    }

    header {
      padding: 24px 20px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(11, 16, 32, 0.92);
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(8px);
    }

    header h1 {
      margin: 0 0 8px;
      font-size: 1.4rem;
    }

    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .toolbar {
      margin-top: 14px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .toolbar input {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      min-width: 280px;
      outline: none;
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      padding: 20px;
      min-height: calc(100vh - 110px);
    }

    .sidebar,
    .content {
      min-width: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .panel-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .panel-header h2,
    .panel-header h3 {
      margin: 0;
      font-size: 1rem;
    }

    .panel-header .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .section-block + .section-block {
      margin-top: 16px;
    }

    .campaign-list,
    .daily-list {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .nav-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
    }

    .nav-card:hover {
      transform: translateY(-1px);
      border-color: var(--accent);
    }

    .nav-card.active {
      border-color: var(--accent-2);
      background: rgba(110, 168, 254, 0.09);
    }

    .nav-top {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }

    .nav-title {
      font-size: 1rem;
      font-weight: 700;
      margin: 0;
      word-break: break-word;
    }

    .nav-count {
      flex-shrink: 0;
      font-size: 0.82rem;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .nav-meta {
      margin-top: 10px;
      display: grid;
      gap: 4px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .empty {
      padding: 16px;
      color: var(--muted);
    }

    .content .hero {
      padding: 18px;
      border-bottom: 1px solid var(--border);
    }

    .hero-title {
      margin: 0 0 8px;
      font-size: 1.35rem;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .hero-chip {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .timeline {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .timeline-item {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel-2);
      overflow: hidden;
    }

    .timeline-main {
      padding: 14px 16px 18px;
    }

    .timeline-date {
      color: var(--accent-2);
      font-size: 0.88rem;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .summary-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--panel-3);
      overflow: hidden;
    }

    .summary-card-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .summary-card-title {
      margin: 0;
      font-size: 1.05rem;
      line-height: 1.45;
    }

    .summary-card-subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.5;
    }

    .summary-card-body {
      padding: 14px 16px 16px;
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field-label {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field-value {
      font-size: 0.95rem;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .field-value.compact {
      font-size: 0.9rem;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .badge-row,
    .inline-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      font-size: 0.78rem;
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .status-new, .status-新規 {
      border-color: rgba(87, 204, 153, 0.5);
      color: var(--new);
    }

    .status-ongoing, .status-継続 {
      border-color: rgba(139, 211, 255, 0.5);
      color: var(--ongoing);
    }

    .status-assessment_update, .status-update_assessment, .status-更新 {
      border-color: rgba(244, 196, 48, 0.5);
      color: var(--assessment);
    }

    .urgency-high {
      border-color: rgba(255, 107, 107, 0.5);
      color: var(--high);
    }

    .urgency-medium {
      border-color: rgba(244, 196, 48, 0.5);
      color: var(--medium);
    }

    .urgency-low {
      border-color: rgba(87, 204, 153, 0.5);
      color: var(--low);
    }

    .urgency-monitor {
      border-color: rgba(141, 153, 174, 0.5);
      color: var(--monitor);
    }

    .supplementary-card {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      padding: 12px 14px;
      display: grid;
      gap: 10px;
    }

    .supplementary-title {
      margin: 0;
      font-size: 0.92rem;
      color: var(--muted);
    }

    details.raw-json {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(0, 0, 0, 0.14);
      overflow: hidden;
    }

    details.raw-json summary {
      cursor: pointer;
      list-style: none;
      padding: 12px 16px;
      color: var(--muted);
      font-size: 0.88rem;
      border-bottom: 1px solid transparent;
    }

    details.raw-json[open] summary {
      border-bottom-color: var(--border);
    }

    details.raw-json summary::-webkit-details-marker {
      display: none;
    }

    details.raw-json summary:hover {
      color: var(--text);
    }

    .json-block {
      margin: 0;
      padding: 12px 16px 16px;
      overflow: auto;
      font-size: 0.83rem;
      line-height: 1.55;
      color: #d7e6ff;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .loading,
    .error {
      padding: 18px;
      color: var(--muted);
    }

    .error {
      color: #ffb4b4;
    }

    @media (max-width: 980px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>CTI / OSINT Portal</h1>
    <p>Campaign / Daily Logs を結論先行で閲覧できるビュー</p>
    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="campaign名・actor名・日付で検索" />
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel section-block">
        <div class="panel-header">
          <h2>Campaigns</h2>
          <div class="sub">actor単位 / 件数 / 最新更新日</div>
        </div>
        <div id="campaignList" class="campaign-list">
          <div class="loading">Campaign一覧を読み込み中...</div>
        </div>
      </section>

      <section class="panel section-block">
        <div class="panel-header">
          <h3>Daily Logs</h3>
          <div class="sub">日付単位 / クリックで右ペイン表示</div>
        </div>
        <div id="dailyList" class="daily-list">
          <div class="loading">Daily一覧を読み込み中...</div>
        </div>
      </section>
    </aside>

    <section class="content panel">
      <div id="contentArea">
        <div class="hero">
          <h2 class="hero-title">Campaign または Daily Log を選択してください</h2>
          <div class="hero-meta">
            <span class="hero-chip">結論先行の要約カード</span>
            <span class="hero-chip">必要時のみ raw JSON 参照</span>
          </div>
        </div>
        <div class="empty">
          左側の Campaigns または Daily Logs を選ぶと、右側に要約カードを表示します。
        </div>
      </div>
    </section>
  </main>

  <script>
    const CAMPAIGN_INDEX_URL = "./campaigns/index.json";
    const DAILY_INDEX_URL = "./logs/index.json";

    const state = {
      campaignGroups: [],
      dailyPaths: [],
      selectedActor: null,
      selectedDailyPath: null,
      selectedMode: null,
      search: ""
    };

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    async function fetchJson(url) {
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`Failed to fetch: ${url} (${res.status})`);
      }
      return res.json();
    }

    function normalizePath(path) {
      if (!path) return path;
      let p = path.trim();
      p = p.replace(/^\.?\//, "");
      p = p.replace(/^docs\//, "");
      return p;
    }

    function extractDateFromPath(path) {
      const m = path.match(/(\d{4}-\d{2}-\d{2})\.json$/);
      return m ? m[1] : null;
    }

    function extractActorFromCampaignPath(path) {
      const normalized = normalizePath(path);
      const m = normalized.match(/^campaigns\/([^/]+)\//);
      return m ? m[1] : null;
    }

    function groupCampaignPaths(paths) {
      const groups = new Map();

      for (const rawPath of paths) {
        const path = normalizePath(rawPath);
        const actor = extractActorFromCampaignPath(path);
        if (!actor) continue;

        const date = extractDateFromPath(path);

        if (!groups.has(actor)) {
          groups.set(actor, {
            actor,
            files: [],
            count: 0,
            latestDate: null
          });
        }

        const group = groups.get(actor);
        group.files.push({ path, date });
        group.count += 1;

        if (!group.latestDate || (date && date > group.latestDate)) {
          group.latestDate = date;
        }
      }

      return Array.from(groups.values())
        .map(group => {
          group.files.sort((a, b) => (b.date || "").localeCompare(a.date || ""));
          return group;
        })
        .sort((a, b) => {
          const dateCompare = (b.latestDate || "").localeCompare(a.latestDate || "");
          if (dateCompare !== 0) return dateCompare;
          return a.actor.localeCompare(b.actor);
        });
    }

    function firstNonEmpty(...values) {
      for (const value of values) {
        if (typeof value === "string" && value.trim()) return value.trim();
      }
      return "";
    }

    function asArray(value) {
      if (Array.isArray(value)) return value.filter(v => String(v ?? "").trim());
      if (typeof value === "string" && value.trim()) return [value.trim()];
      return [];
    }

    function joinList(value) {
      const arr = asArray(value);
      return arr.length ? arr.join(" / ") : "";
    }

    function cssSafe(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[^a-z0-9_\-\u3040-\u30ff\u3400-\u9fff]/g, "_");
    }

    function statusLabel(value) {
      const v = String(value || "").toLowerCase();
      if (v === "new") return "新規";
      if (v === "ongoing") return "継続";
      if (v === "assessment_update" || v === "update_assessment") return "評価更新";
      if (value === "新規" || value === "継続" || value === "更新") return value;
      return value || "未設定";
    }

    function urgencyLabel(value) {
      const v = String(value || "").toLowerCase();
      if (v === "high") return "高";
      if (v === "medium") return "中";
      if (v === "low") return "低";
      if (v === "monitor") return "監視";
      return value || "未設定";
    }

    function getCampaignConfidence(record) {
      return firstNonEmpty(
        record.confidence,
        record.attribution_confidence,
        record.campaign?.attribution_confidence
      ) || "未設定";
    }

    function getDailyItemConfidence(item) {
      return firstNonEmpty(
        item.assessment?.confidence,
        item.campaign?.attribution_confidence
      ) || "未設定";
    }

    function buildCampaignCardData(record, fallbackPath, fallbackDate, actorName) {
      const campaignOrActor = firstNonEmpty(
        record.campaign?.name,
        record.campaign_name,
        record.name,
        actorName,
        record.items?.[0]?.name,
        fallbackPath
      );

      const status = firstNonEmpty(record.update_type, record.status, "ongoing");

      const executiveSummary = firstNonEmpty(
        record.executive_summary,
        record.campaign_summary,
        record.summary,
        record.items?.[0]?.summary,
        "要約未設定"
      );

      const changeSummary = joinList(record.change_summary);
      const executiveCombined = changeSummary
        ? `${executiveSummary}\n\n前回からの主な差分: ${changeSummary}`
        : executiveSummary;

      const operationalRelevance = firstNonEmpty(
        record.operational_relevance,
        record.assessment_delta,
        record.strategic_view?.general,
        "記載なし"
      );

      const urgency = firstNonEmpty(record.urgency, "monitor");
      const recommendedAction = joinList(record.recommended_action) || "記載なし";
      const confidence = getCampaignConfidence(record);

      const aliases = asArray(record.campaign?.aliases || record.aliases);
      const suspectedActor = firstNonEmpty(record.campaign?.suspected_actor, record.suspected_actor);
      const tags = asArray(record.tags);

      return {
        title: campaignOrActor,
        subtitle: `最新の事象日付: ${fallbackDate || "-"}`,
        status,
        executiveCombined,
        operationalRelevance,
        urgency,
        recommendedAction,
        confidence,
        aliases,
        suspectedActor,
        tags
      };
    }

    function buildDailyItemCardData(item, fallbackDate) {
      const title = firstNonEmpty(
        item.name,
        item.campaign?.name,
        "名称未設定"
      );

      const actor = firstNonEmpty(
        item.campaign?.suspected_actor,
        item.actors?.[0]?.name,
        item.campaign?.name
      );

      const status = firstNonEmpty(item.status, "継続");
      const executiveSummary = firstNonEmpty(
        item.executive_summary,
        item.summary,
        "要約未設定"
      );

      const changeSummary = joinList(item.change_summary);
      const executiveCombined = changeSummary
        ? `${executiveSummary}\n\n前回からの主な差分: ${changeSummary}`
        : executiveSummary;

      const operationalRelevance = firstNonEmpty(
        item.operational_relevance,
        item.assessment?.why_it_matters,
        item.strategic_view?.general,
        "記載なし"
      );

      const urgency = firstNonEmpty(item.urgency, "monitor");
      const recommendedAction = joinList(item.recommended_action) || "記載なし";
      const confidence = getDailyItemConfidence(item);
      const aliases = asArray(item.campaign?.aliases);
      const suspectedActor = firstNonEmpty(item.campaign?.suspected_actor, actor);
      const tags = asArray(item.tags);

      return {
        title,
        subtitle: `事象日付: ${fallbackDate || "-"} / Actor: ${actor || "未設定"}`,
        status,
        executiveCombined,
        operationalRelevance,
        urgency,
        recommendedAction,
        confidence,
        aliases,
        suspectedActor,
        tags
      };
    }

    function renderSupplementaryCard(card) {
      const aliasHtml = card.aliases.length
        ? `
          <div class="field">
            <div class="field-label">Aliases</div>
            <div class="inline-list">
              ${card.aliases.map(alias => `<span class="badge">${escapeHtml(alias)}</span>`).join("")}
            </div>
          </div>
        `
        : "";

      const actorHtml = card.suspectedActor
        ? `
          <div class="field">
            <div class="field-label">Suspected Actor</div>
            <div class="field-value compact">${escapeHtml(card.suspectedActor)}</div>
          </div>
        `
        : "";

      const tagsHtml = card.tags.length
        ? `
          <div class="field">
            <div class="field-label">Tags</div>
            <div class="inline-list">
              ${card.tags.map(tag => `<span class="badge">${escapeHtml(tag)}</span>`).join("")}
            </div>
          </div>
        `
        : "";

      if (!aliasHtml && !actorHtml && !tagsHtml) return "";

      return `
        <div class="supplementary-card">
          <h4 class="supplementary-title">Supplementary Information</h4>
          ${actorHtml}
          ${aliasHtml}
          ${tagsHtml}
        </div>
      `;
    }

    function renderSummaryCard(card) {
      return `
        <section class="summary-card">
          <div class="summary-card-header">
            <div>
              <h3 class="summary-card-title">${escapeHtml(card.title)}</h3>
              <div class="summary-card-subtitle">${escapeHtml(card.subtitle)}</div>
            </div>
            <div class="badge-row">
              <span class="badge status-${cssSafe(card.status)}">${escapeHtml(statusLabel(card.status))}</span>
              <span class="badge urgency-${cssSafe(card.urgency)}">緊急度: ${escapeHtml(urgencyLabel(card.urgency))}</span>
            </div>
          </div>

          <div class="summary-card-body">
            <div class="two-col">
              <div class="field">
                <div class="field-label">Item / Campaign</div>
                <div class="field-value">${escapeHtml(card.title)}</div>
              </div>
              <div class="field">
                <div class="field-label">Confidence</div>
                <div class="field-value">${escapeHtml(card.confidence)}</div>
              </div>
            </div>

            <div class="field">
              <div class="field-label">Executive Summary</div>
              <div class="field-value">${escapeHtml(card.executiveCombined)}</div>
            </div>

            <div class="field">
              <div class="field-label">Operational Relevance</div>
              <div class="field-value">${escapeHtml(card.operationalRelevance)}</div>
            </div>

            <div class="field">
              <div class="field-label">Urgency / Immediate Action</div>
              <div class="field-value">${escapeHtml(urgencyLabel(card.urgency))}</div>
            </div>

            <div class="field">
              <div class="field-label">Recommended Action</div>
              <div class="field-value">${escapeHtml(card.recommendedAction)}</div>
            </div>
          </div>
        </section>

        ${renderSupplementaryCard(card)}
      `;
    }

    function renderCampaignList() {
      const root = document.getElementById("campaignList");
      const q = state.search.trim().toLowerCase();

      const filtered = state.campaignGroups.filter(group => {
        if (!q) return true;
        return group.actor.toLowerCase().includes(q);
      });

      if (filtered.length === 0) {
        root.innerHTML = `<div class="empty">該当するCampaignがありません。</div>`;
        return;
      }

      root.innerHTML = filtered.map(group => `
        <article
          class="nav-card ${state.selectedMode === "campaign" && state.selectedActor === group.actor ? "active" : ""}"
          data-actor="${escapeHtml(group.actor)}"
        >
          <div class="nav-top">
            <h3 class="nav-title">${escapeHtml(group.actor)}</h3>
            <div class="nav-count">${group.count}件</div>
          </div>
          <div class="nav-meta">
            <div>最新更新日: ${escapeHtml(group.latestDate || "-")}</div>
            <div>記録件数: ${group.count}</div>
          </div>
        </article>
      `).join("");

      root.querySelectorAll(".nav-card").forEach(el => {
        el.addEventListener("click", () => {
          state.selectedMode = "campaign";
          state.selectedActor = el.dataset.actor;
          state.selectedDailyPath = null;
          renderCampaignList();
          renderDailyList();
          renderSelectedCampaign();
        });
      });
    }

    function renderDailyList() {
      const root = document.getElementById("dailyList");
      const q = state.search.trim().toLowerCase();

      const filtered = state.dailyPaths.filter(path => {
        if (!q) return true;
        return path.toLowerCase().includes(q);
      });

      if (filtered.length === 0) {
        root.innerHTML = `<div class="empty">該当するDaily Logsがありません。</div>`;
        return;
      }

      root.innerHTML = filtered.slice(0, 60).map(path => {
        const date = extractDateFromPath(path) || path;
        return `
          <article
            class="nav-card ${state.selectedMode === "daily" && state.selectedDailyPath === path ? "active" : ""}"
            data-path="${escapeHtml(path)}"
          >
            <div class="nav-top">
              <h3 class="nav-title">${escapeHtml(date)}</h3>
            </div>
            <div class="nav-meta">
              <div>${escapeHtml(path)}</div>
            </div>
          </article>
        `;
      }).join("");

      root.querySelectorAll(".nav-card").forEach(el => {
        el.addEventListener("click", () => {
          state.selectedMode = "daily";
          state.selectedDailyPath = el.dataset.path;
          state.selectedActor = null;
          renderCampaignList();
          renderDailyList();
          renderSelectedDaily();
        });
      });
    }

    async function renderSelectedCampaign() {
      const content = document.getElementById("contentArea");
      const actor = state.selectedActor;
      const group = state.campaignGroups.find(g => g.actor === actor);

      if (!group) {
        content.innerHTML = `<div class="empty">Campaignが見つかりません。</div>`;
        return;
      }

      content.innerHTML = `
        <div class="hero">
          <h2 class="hero-title">${escapeHtml(group.actor)}</h2>
          <div class="hero-meta">
            <span class="hero-chip">記録件数: ${group.count}</span>
            <span class="hero-chip">最新更新日: ${escapeHtml(group.latestDate || "-")}</span>
            <span class="hero-chip">表示順: 新しい順</span>
          </div>
        </div>
        <div class="loading">Campaign データを読み込み中...</div>
      `;

      try {
        const records = await Promise.all(
          group.files.map(async file => {
            try {
              const data = await fetchJson(`./${file.path}`);
              return { file, data, ok: true };
            } catch (err) {
              return { file, data: { _error: String(err.message || err) }, ok: false };
            }
          })
        );

        const timelineHtml = records.map(({ file, data, ok }) => {
          const date = file.date || "-";
          const jsonText = JSON.stringify(data, null, 2);

          if (!ok) {
            return `
              <article class="timeline-item">
                <div class="timeline-main">
                  <div class="timeline-date">${escapeHtml(date)}</div>
                  <div class="error">読み込み失敗: ${escapeHtml(data._error || "unknown error")}</div>
                  <details class="raw-json">
                    <summary>Appendix: raw JSON を表示</summary>
                    <pre class="json-block">${escapeHtml(jsonText)}</pre>
                  </details>
                </div>
              </article>
            `;
          }

          const card = buildCampaignCardData(data, file.path, date, group.actor);

          return `
            <article class="timeline-item">
              <div class="timeline-main">
                <div class="timeline-date">${escapeHtml(date)}</div>
                ${renderSummaryCard(card)}
                <details class="raw-json">
                  <summary>Appendix: raw JSON を表示</summary>
                  <pre class="json-block">${escapeHtml(jsonText)}</pre>
                </details>
              </div>
            </article>
          `;
        }).join("");

        content.innerHTML = `
          <div class="hero">
            <h2 class="hero-title">${escapeHtml(group.actor)}</h2>
            <div class="hero-meta">
              <span class="hero-chip">記録件数: ${group.count}</span>
              <span class="hero-chip">最新更新日: ${escapeHtml(group.latestDate || "-")}</span>
              <span class="hero-chip">Campaign detail view</span>
            </div>
          </div>
          <div class="timeline">
            ${timelineHtml || `<div class="empty">表示できる記録がありません。</div>`}
          </div>
        `;
      } catch (err) {
        content.innerHTML = `
          <div class="hero">
            <h2 class="hero-title">${escapeHtml(group.actor)}</h2>
          </div>
          <div class="error">Campaign表示に失敗しました: ${escapeHtml(err.message || err)}</div>
        `;
      }
    }

    async function renderSelectedDaily() {
      const content = document.getElementById("contentArea");
      const path = state.selectedDailyPath;
      const date = extractDateFromPath(path) || path;

      if (!path) {
        content.innerHTML = `<div class="empty">Daily Logが選択されていません。</div>`;
        return;
      }

      content.innerHTML = `
        <div class="hero">
          <h2 class="hero-title">${escapeHtml(date)}</h2>
          <div class="hero-meta">
            <span class="hero-chip">Daily log detail view</span>
            <span class="hero-chip">要約カード + Appendix</span>
          </div>
        </div>
        <div class="loading">Daily Log を読み込み中...</div>
      `;

      try {
        const data = await fetchJson(`./${path}`);
        const items = Array.isArray(data.items) ? data.items : [];
        const jsonText = JSON.stringify(data, null, 2);

        const cardsHtml = items.map((item, index) => {
          const card = buildDailyItemCardData(item, data.date || date);
          return `
            <article class="timeline-item">
              <div class="timeline-main">
                <div class="timeline-date">${escapeHtml(data.date || date)} / Item ${index + 1}</div>
                ${renderSummaryCard(card)}
              </div>
            </article>
          `;
        }).join("");

        content.innerHTML = `
          <div class="hero">
            <h2 class="hero-title">${escapeHtml(data.title || date)}</h2>
            <div class="hero-meta">
              <span class="hero-chip">Date: ${escapeHtml(data.date || date)}</span>
              <span class="hero-chip">Items: ${items.length}</span>
              <span class="hero-chip">Timezone: ${escapeHtml(data.timezone || "-")}</span>
            </div>
          </div>
          <div class="timeline">
            ${cardsHtml || `<div class="empty">表示できる item がありません。</div>`}
            <details class="raw-json">
              <summary>Appendix: daily raw JSON を表示</summary>
              <pre class="json-block">${escapeHtml(jsonText)}</pre>
            </details>
          </div>
        `;
      } catch (err) {
        content.innerHTML = `
          <div class="hero">
            <h2 class="hero-title">${escapeHtml(date)}</h2>
          </div>
          <div class="error">Daily Log表示に失敗しました: ${escapeHtml(err.message || err)}</div>
        `;
      }
    }

    async function init() {
      try {
        const [campaignPaths, dailyPaths] = await Promise.all([
          fetchJson(CAMPAIGN_INDEX_URL),
          fetchJson(DAILY_INDEX_URL)
        ]);

        state.campaignGroups = groupCampaignPaths(campaignPaths);
        state.dailyPaths = [...new Set(dailyPaths)]
          .map(normalizePath)
          .filter(p => p.startsWith("logs/"))
          .sort((a, b) => b.localeCompare(a));

        renderCampaignList();
        renderDailyList();

        if (state.campaignGroups.length > 0) {
          state.selectedMode = "campaign";
          state.selectedActor = state.campaignGroups[0].actor;
          renderCampaignList();
          renderSelectedCampaign();
        }
      } catch (err) {
        document.getElementById("campaignList").innerHTML = `
          <div class="error">Campaign一覧の読み込みに失敗しました: ${escapeHtml(err.message || err)}</div>
        `;
        document.getElementById("dailyList").innerHTML = `
          <div class="error">Daily一覧の読み込みに失敗しました: ${escapeHtml(err.message || err)}</div>
        `;
      }
    }

    document.getElementById("searchInput").addEventListener("input", (e) => {
      state.search = e.target.value;
      renderCampaignList();
      renderDailyList();
    });

    init();
  </script>
</body>
</html>
