<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Daily Log</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 2rem;
      max-width: 1200px;
      line-height: 1.6;
      color: #222;
    }

    h1 {
      margin-bottom: 0.5rem;
    }

    .meta {
      color: #555;
      margin-bottom: 1rem;
    }

    .toolbar {
      margin-bottom: 1.5rem;
    }

    .toolbar label {
      display: block;
      font-weight: bold;
      margin-bottom: 0.4rem;
    }

    .toolbar input {
      width: 100%;
      max-width: 420px;
      padding: 0.6rem 0.8rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: start;
    }

    .section-box {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1rem;
      background: #fff;
    }

    .section-box h2 {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 1.2rem;
    }

    .list a {
      display: block;
      margin-bottom: 0.4rem;
      color: #0366d6;
      text-decoration: none;
      cursor: pointer;
    }

    .list a:hover {
      text-decoration: underline;
    }

    .list a.active {
      font-weight: bold;
      color: #111;
      text-decoration: underline;
    }

    .campaign-group {
      margin-bottom: 1rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid #eee;
    }

    .campaign-group:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .campaign-group-title {
      font-weight: bold;
      margin-bottom: 0.5rem;
    }

    .campaign-group-items {
      padding-left: 1rem;
    }

    .empty {
      color: #777;
    }

    .viewer {
      margin-top: 2rem;
    }

    .current-title {
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 0.8rem;
    }

    .current-meta {
      color: #555;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    pre {
      background: #f6f8fa;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 800px) {
      .columns {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <h1>Cyber Daily Log</h1>
  <p class="meta">日々の攻撃キャンペーン、主要な攻撃キャンペーンの日々の動向を、それぞれまとめています。</p>

  <div class="toolbar">
    <label for="search-box">検索</label>
    <input
      id="search-box"
      type="text"
      placeholder="例: 2026-04-10 / APT29 / TA416"
    >
  </div>

  <div class="columns">
    <div class="section-box">
      <h2>Daily Logs</h2>
      <div id="logs-list" class="list">Loading...</div>
    </div>

    <div class="section-box">
      <h2>Campaigns</h2>
      <div id="campaigns-list" class="list">Loading...</div>
    </div>
  </div>

  <div class="viewer">
    <h2>詳細</h2>
    <div id="current-title" class="current-title">項目を選択してください</div>
    <div id="current-meta" class="current-meta"></div>
    <pre id="viewer">項目を選択してください</pre>
  </div>

  <script>
    const LOGS_BASE = "/campaign-daily-logs/logs/";
    const CAMPAIGNS_BASE = "/campaign-daily-logs/campaigns/";

    let allLogs = [];
    let allCampaigns = [];
    let currentSelection = {
      type: null,
      path: null
    };

    function normalizeText(value) {
      return (value || "").toString().toLowerCase();
    }

    function getSearchKeyword() {
      return normalizeText(document.getElementById("search-box").value.trim());
    }

    function filterList(list, keyword) {
      if (!keyword) {
        return list.slice();
      }
      return list.filter(item => normalizeText(item).includes(keyword));
    }

    function escapeHtml(text) {
      return text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function setCurrentSelection(type, path, titleText = "", metaText = "") {
      currentSelection.type = type;
      currentSelection.path = path;

      document.getElementById("current-title").textContent =
        titleText || path || "項目を選択してください";

      document.getElementById("current-meta").textContent = metaText || "";

      updateActiveLinks();
    }

    function updateActiveLinks() {
      const allLinks = document.querySelectorAll("[data-item-type][data-item-path]");
      allLinks.forEach(link => {
        const isActive =
          link.dataset.itemType === currentSelection.type &&
          link.dataset.itemPath === currentSelection.path;

        if (isActive) {
          link.classList.add("active");
        } else {
          link.classList.remove("active");
        }
      });
    }

    function buildDisplayTitle(type, path, data) {
      if (type === "log") {
        return data.title || path;
      }

      if (type === "campaign") {
        return data.name || data.title || path;
      }

      return path;
    }

    function buildMetaText(type, path, data) {
      if (type === "log") {
        const date = data.date ? `Date: ${data.date}` : "";
        return date;
      }

      if (type === "campaign") {
        const parts = [];
        if (path) {
          parts.push(`Path: ${path}`);
        }
        if (data.date) {
          parts.push(`Date: ${data.date}`);
        }
        if (data.status) {
          parts.push(`Status: ${data.status}`);
        }
        return parts.join(" | ");
      }

      return "";
    }

    function loadJson(type, basePath, path) {
      fetch(basePath + path)
        .then(res => {
          if (!res.ok) {
            throw new Error("HTTP error " + res.status);
          }
          return res.json();
        })
        .then(data => {
          const titleText = buildDisplayTitle(type, path, data);
          const metaText = buildMetaText(type, path, data);

          setCurrentSelection(type, path, titleText, metaText);

          document.getElementById("viewer").textContent =
            JSON.stringify(data, null, 2);
        })
        .catch(err => {
          setCurrentSelection(type, path, path, "");
          document.getElementById("viewer").textContent =
            "Error: " + err;
        });
    }

    function renderLogsList(list) {
      const container = document.getElementById("logs-list");
      container.innerHTML = "";

      if (list.length === 0) {
        container.innerHTML = '<div class="empty">該当する Daily Log はありません</div>';
        return;
      }

      list.forEach(path => {
        const link = document.createElement("a");
        link.href = "#";
        link.textContent = path;
        link.dataset.itemType = "log";
        link.dataset.itemPath = path;

        link.onclick = (event) => {
          event.preventDefault();
          loadJson("log", LOGS_BASE, path);
        };

        container.appendChild(link);
      });

      updateActiveLinks();
    }

    function groupCampaignsByActor(list) {
      const grouped = {};

      list.forEach(path => {
        const parts = path.split("/");
        const actor = parts[0] || "Other";
        const fileName = parts.slice(1).join("/") || path;

        if (!grouped[actor]) {
          grouped[actor] = [];
        }

        grouped[actor].push({
          fullPath: path,
          label: fileName
        });
      });

      Object.keys(grouped).forEach(actor => {
        grouped[actor].sort((a, b) => a.label.localeCompare(b.label));
      });

      return grouped;
    }

    function renderCampaignsList(list) {
      const container = document.getElementById("campaigns-list");
      container.innerHTML = "";

      if (list.length === 0) {
        container.innerHTML = '<div class="empty">該当する Campaign はありません</div>';
        return;
      }

      const grouped = groupCampaignsByActor(list);
      const actors = Object.keys(grouped).sort();

      actors.forEach(actor => {
        const group = document.createElement("div");
        group.className = "campaign-group";

        const title = document.createElement("div");
        title.className = "campaign-group-title";
        title.textContent = actor;

        const items = document.createElement("div");
        items.className = "campaign-group-items";

        grouped[actor].forEach(entry => {
          const link = document.createElement("a");
          link.href = "#";
          link.textContent = entry.label;
          link.dataset.itemType = "campaign";
          link.dataset.itemPath = entry.fullPath;

          link.onclick = (event) => {
            event.preventDefault();
            loadJson("campaign", CAMPAIGNS_BASE, entry.fullPath);
          };

          items.appendChild(link);
        });

        group.appendChild(title);
        group.appendChild(items);
        container.appendChild(group);
      });

      updateActiveLinks();
    }

    function rerenderLists() {
      const keyword = getSearchKeyword();

      const filteredLogs = filterList(allLogs, keyword).slice().reverse();
      const filteredCampaigns = filterList(allCampaigns, keyword);

      renderLogsList(filteredLogs);
      renderCampaignsList(filteredCampaigns);
    }

    function fetchJsonList(basePath, indexFile) {
      return fetch(basePath + indexFile)
        .then(res => {
          if (!res.ok) {
            throw new Error("HTTP error " + res.status);
          }
          return res.json();
        });
    }

    Promise.all([
      fetchJsonList(LOGS_BASE, "index.json"),
      fetchJsonList(CAMPAIGNS_BASE, "index.json")
    ])
      .then(([logsList, campaignsList]) => {
        allLogs = logsList.slice();
        allCampaigns = campaignsList.slice();

        rerenderLists();

        if (allLogs.length > 0) {
          const latestLog = allLogs.slice().reverse()[0];
          loadJson("log", LOGS_BASE, latestLog);
        }
      })
      .catch(err => {
        document.getElementById("logs-list").textContent = "Error: " + err;
        document.getElementById("campaigns-list").textContent = "Error: " + err;
        document.getElementById("viewer").textContent = "Error: " + err;
      });

    document.getElementById("search-box").addEventListener("input", () => {
      rerenderLists();
    });
  </script>
</body>
</html>
