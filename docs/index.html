<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Daily Log</title>

  <style>
    body {
      font-family: sans-serif;
      margin: 2rem;
      max-width: 1200px;
      line-height: 1.6;
    }

    h1 {
      margin-bottom: 0.5rem;
    }

    .meta {
      color: #555;
      margin-bottom: 1rem;
    }

    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      align-items: start;
    }

    .section-box {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1rem;
      background: #fff;
    }

    .section-box h2 {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 1.2rem;
    }

    .list a {
      display: block;
      margin-bottom: 0.4rem;
      color: #0366d6;
      text-decoration: none;
      cursor: pointer;
    }

    .list a:hover {
      text-decoration: underline;
    }

    pre {
      background: #f6f8fa;
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .viewer {
      margin-top: 2rem;
    }

    @media (max-width: 800px) {
      .columns {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <h1>Cyber Daily Log</h1>
  <p class="meta">Daily Logs と Campaigns をクリックで詳細表示</p>

  <div class="columns">
    <div class="section-box">
      <h2>Daily Logs</h2>
      <div id="logs-list" class="list">Loading...</div>
    </div>

    <div class="section-box">
      <h2>Campaigns</h2>
      <div id="campaigns-list" class="list">Loading...</div>
    </div>
  </div>

  <div class="viewer">
    <h2>詳細</h2>
    <pre id="viewer">項目を選択してください</pre>
  </div>

  <script>
    const LOGS_BASE = "/campaign-daily-logs/logs/";
    const CAMPAIGNS_BASE = "/campaign-daily-logs/campaigns/";

    function loadJson(basePath, path) {
      fetch(basePath + path)
        .then(res => {
          if (!res.ok) {
            throw new Error("HTTP error " + res.status);
          }
          return res.json();
        })
        .then(data => {
          document.getElementById("viewer").textContent =
            JSON.stringify(data, null, 2);
        })
        .catch(err => {
          document.getElementById("viewer").textContent =
            "Error: " + err;
        });
    }

    function renderList(containerId, basePath, indexFile, autoLoadFirst = false, reverseList = false) {
      fetch(basePath + indexFile)
        .then(res => {
          if (!res.ok) {
            throw new Error("HTTP error " + res.status);
          }
          return res.json();
        })
        .then(list => {
          const container = document.getElementById(containerId);
          container.innerHTML = "";

          if (reverseList) {
            list.reverse();
          }

          if (autoLoadFirst && list.length > 0) {
            loadJson(basePath, list[0]);
          }

          list.forEach(path => {
            const link = document.createElement("a");
            link.href = "#";
            link.textContent = path;

            link.onclick = (event) => {
              event.preventDefault();
              loadJson(basePath, path);
            };

            container.appendChild(link);
          });

          if (list.length === 0) {
            container.textContent = "項目がありません";
          }
        })
        .catch(err => {
          document.getElementById(containerId).textContent =
            "Error: " + err;
        });
    }

    renderList("logs-list", LOGS_BASE, "index.json", true, true);
    renderList("campaigns-list", CAMPAIGNS_BASE, "index.json", false, false);
  </script>
</body>
</html>
