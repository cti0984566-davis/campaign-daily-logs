name: Update for GitHub pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare docs content
        run: |
          mkdir -p docs/logs
          mkdir -p docs/campaigns

          if [ -d logs ]; then
            cp -r logs/. docs/logs/
          fi

          if [ -d campaigns ]; then
            cp -r campaigns/. docs/campaigns/
          fi

          find docs/logs -type f -name "*.json" \
            ! -name "index.json" \
            | sed 's#^docs/logs/##' \
            | sort \
            > docs/logs/index.json

          python3 - <<'PY'
          import json
          from pathlib import Path

          p = Path("docs/logs/index.json")
          lines = [line.strip() for line in p.read_text().splitlines() if line.strip()]
          p.write_text(json.dumps(lines, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

          find docs/campaigns -type f -name "*.json" \
            ! -name "index.json" \
            | sed 's#^docs/campaigns/##' \
            | sort \
            > docs/campaigns/index.json

          python3 - <<'PY'
          import json
          from pathlib import Path

          p = Path("docs/campaigns/index.json")
          lines = [line.strip() for line in p.read_text().splitlines() if line.strip()]
          p.write_text(json.dumps(lines, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
