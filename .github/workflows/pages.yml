name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare docs directory
        run: |
          set -euo pipefail

          mkdir -p docs
          rm -rf docs/logs docs/campaigns
          mkdir -p docs/logs docs/campaigns

          if [ -d logs ]; then
            cp -R logs/. docs/logs/
          fi

          if [ -d campaigns ]; then
            cp -R campaigns/. docs/campaigns/
          fi

      - name: Generate logs index.json
        run: |
          set -euo pipefail

          mkdir -p docs/logs

          if find docs/logs -type f -name "*.json" ! -name "index.json" | grep -q .; then
            find docs/logs -type f -name "*.json" ! -name "index.json" \
              | sort \
              | sed 's#^docs/##' \
              | jq -R . \
              | jq -s . > docs/logs/index.json
          else
            echo '[]' > docs/logs/index.json
          fi

      - name: Generate campaigns index.json
        run: |
          set -euo pipefail

          mkdir -p docs/campaigns

          if find docs/campaigns -type f -name "*.json" ! -name "index.json" | grep -q .; then
            find docs/campaigns -type f -name "*.json" ! -name "index.json" \
              | sort \
              | sed 's#^docs/##' \
              | jq -R . \
              | jq -s . > docs/campaigns/index.json
          else
            echo '[]' > docs/campaigns/index.json
          fi

      - name: Verify generated files
        run: |
          set -euo pipefail
          echo "===== docs/logs/index.json ====="
          cat docs/logs/index.json
          echo
          echo "===== docs/campaigns/index.json ====="
          cat docs/campaigns/index.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
